version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: file_review_postgres
    environment:
      POSTGRES_USER: file_review_user
      POSTGRES_PASSWORD: file_review_password
      POSTGRES_DB: file_review_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U file_review_user -d file_review_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: file_review_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  markitdown:
    build:
      context: ./backend/markitdown-service
      dockerfile: Dockerfile
    container_name: file_review_markitdown
    ports:
      - "${PARSER_PORT:-8000}:${PARSER_PORT:-8000}"
    environment:
      - TZ=Asia/Shanghai
      - PORT=${PARSER_PORT:-8000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen(f'http://localhost:{os.environ.get(\"PORT\", \"8000\")}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

volumes:
  postgres_data:
  redis_data:
