# MarkItDown 文档解析服务
# 默认端口 8000，可通过 PORT 环境变量修改
# 独立运行: docker-compose up -d
# 主项目编排: 由根目录 docker-compose.yml 管理
version: "3.8"

services:
  markitdown:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: markitdown_service
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - TZ=Asia/Shanghai
      - PORT=${PORT:-8000}
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request; urllib.request.urlopen(f'http://localhost:{os.environ.get(\"PORT\", \"8000\")}/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
