# ============================================
# 文件智能审查系统 - 完整部署配置（在线构建版）
# 包含: PostgreSQL + Redis + MarkItDown + 后端 + 前端
# ⚠️ 此配置使用 build 上下文，需要源码和公网，不适合离线部署
# 离线部署请使用 docker-compose.offline.yml
# ============================================

services:
  # ==========================================
  # PostgreSQL 15 数据库
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg15
    container_name: file_review_postgres
    environment:
      POSTGRES_USER: file_review_user
      POSTGRES_PASSWORD: file_review_password
      POSTGRES_DB: file_review_db
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/prisma/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U file_review_user -d file_review_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file-review-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  # ==========================================
  # Redis 7 缓存
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: file_review_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - file-review-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ==========================================
  # MarkItDown 文档解析服务
  # ==========================================
  markitdown:
    build:
      context: ./backend/markitdown-service
      dockerfile: Dockerfile
    image: file-review-markitdown:v1.0
    container_name: file_review_markitdown
    ports:
      - "${PARSER_PORT:-8000}:8000"
    environment:
      - TZ=Asia/Shanghai
      - PORT=8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - file-review-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================
  # 后端 API 服务
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: file-review-backend:v1.0
    container_name: file_review_backend
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATABASE_URL=postgresql://file_review_user:file_review_password@postgres:5432/file_review_db
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-enterprise-review-system-jwt-secret-2026}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - PARSER_SERVICE_URL=http://markitdown:8000
      - MAXKB_BASE_URL=${MAXKB_BASE_URL:-http://maxkb:8080}
      - MAXKB_PUBLIC_URL=${MAXKB_PUBLIC_URL:-http://localhost:8080}
      - TZ=Asia/Shanghai
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      markitdown:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - file-review-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

  # ==========================================
  # 前端 Web 服务 (Nginx)
  # ==========================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    image: file-review-frontend:v1.0
    container_name: file_review_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    restart: unless-stopped
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - file-review-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M

networks:
  file-review-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  uploads:
